<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Planner</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0eeea;
    --text: #1a1a1a; --text2: #666; --text3: #999;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --purple: #534AB7; --purple-light: #EEEDFE; --purple-mid: #7F77DD;
    --green: #1D9E75; --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
      --text: #f2f2f7; --text2: #aeaeb2; --text3: #636366;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --purple-light: #2a2660;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
  #app { width: 100%; max-width: 680px; height: 680px; display: flex; flex-direction: column; background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; }
  #topbar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
  #topbar-icon { width: 30px; height: 30px; border-radius: 50%; background: var(--purple-light); display: flex; align-items: center; justify-content: center; }
  #topbar-icon i { font-size: 16px; color: var(--purple); }
  #topbar-title { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; }
  #topbar-step { font-size: 12px; color: var(--text3); }
  #progress { display: flex; gap: 4px; padding: 0 16px 10px; flex-shrink: 0; }
  .pd { height: 3px; flex: 1; border-radius: 2px; background: var(--border); transition: background .4s; }
  .pd.done { background: var(--green); }
  .pd.active { background: var(--purple-mid); }
  #chat { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
  .row { display: flex; gap: 8px; align-items: flex-start; max-width: 88%; }
  .row.user { align-self: flex-end; flex-direction: row-reverse; }
  .av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 2px; background: var(--bg2); border: 0.5px solid var(--border); color: var(--text2); }
  .av.uav { background: var(--purple-light); color: var(--purple); border-color: var(--purple-mid); }
  .bub { padding: 9px 13px; border-radius: 4px 14px 14px 14px; font-size: 13px; line-height: 1.6; background: var(--bg2); color: var(--text); }
  .row.user .bub { background: var(--purple); color: #fff; border-radius: 14px 4px 14px 14px; }
  .opts { display: flex; flex-wrap: wrap; gap: 6px; padding-left: 36px; margin-top: 2px; }
  .ob { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--purple-mid); background: transparent; color: var(--purple); font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s; }
  .ob:hover { background: var(--purple-light); }
  .ob.sel { background: var(--purple); color: #fff; border-color: var(--purple); }
  .ob:disabled { opacity: .5; cursor: default; }
  .typing { display: flex; gap: 4px; padding: 9px 13px; background: var(--bg2); border-radius: 4px 14px 14px 14px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: .2s; } .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }
  #bottom { padding: 10px 14px; border-top: 0.5px solid var(--border); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; background: var(--bg); }
  #inp { flex: 1; resize: none; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 11px; font-size: 13px; font-family: inherit; line-height: 1.4; min-height: 36px; max-height: 90px; background: var(--bg); color: var(--text); outline: none; }
  #inp:focus { border-color: var(--purple-mid); }
  #sbtn { width: 34px; height: 34px; border-radius: var(--radius-sm); border: none; background: var(--purple); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s; }
  #sbtn:hover { background: var(--purple-mid); }
  #sbtn:disabled { opacity: .35; cursor: not-allowed; }
  .mcard { background: var(--bg3); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 8px; font-size: 12px; line-height: 1.6; }
  .mrow { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; border-bottom: 0.5px solid var(--border); }
  .mrow:last-child { border-bottom: none; }
  .mrow i { color: var(--purple-mid); font-size: 15px; margin-top: 1px; flex-shrink: 0; }
  .mcols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .mc { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; }
  .mc .ml { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
  .mc .mv { font-size: 16px; font-weight: 500; color: var(--text); }
  .plan { background: var(--bg3); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 8px; font-size: 12px; line-height: 1.8; color: var(--text); white-space: pre-wrap; max-height: 240px; overflow-y: auto; border: 0.5px solid var(--border); }
  .err { color: #c0392b; font-size: 12px; padding: 6px 10px; background: #fdf0f0; border-radius: var(--radius-sm); margin-top: 4px; border: 0.5px solid #f5c6c6; }
  .loading-line { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); margin-top: 4px; }
  .spin { width: 12px; height: 12px; border: 1.5px solid var(--border2); border-top-color: var(--purple); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div id="topbar-icon"><i class="ti ti-barbell"></i></div>
    <span id="topbar-title">Fitness planner</span>
    <span id="topbar-step"></span>
  </div>
  <div id="progress"></div>
  <div id="chat"></div>
  <div id="bottom">
    <textarea id="inp" placeholder="Type a message..." rows="1"></textarea>
    <button id="sbtn" aria-label="Send"><i class="ti ti-arrow-up" style="font-size:15px"></i></button>
  </div>
</div>

<script>
const API = '';
const chat = document.getElementById('chat');
const inp = document.getElementById('inp');
const sbtn = document.getElementById('sbtn');
const progBar = document.getElementById('progress');
const stepLabel = document.getElementById('topbar-step');
const STEPS = 14;

for (let i = 0; i < STEPS; i++) {
  const d = document.createElement('div');
  d.className = 'pd'; d.id = 'p' + i;
  progBar.appendChild(d);
}

function setProgress(n, label) {
  for (let i = 0; i < STEPS; i++) {
    document.getElementById('p' + i).className = 'pd' + (i < n ? ' done' : i === n ? ' active' : '');
  }
  if (label) stepLabel.textContent = label;
}

let state = {
  step: 0,
  goal: '',
  refinedGoal: '',
  targetWeight: null,
  targetDate: null,
  weight: 0,
  height: 0,
  schedule: [],
  calories: 0,
  preferences: {},
  gyms: [],
  selectedGym: '',
  plan: ''
};

async function callApi(stepName, payload) {
  const res = await fetch(`${API}/api/step`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ step: stepName, payload })
  });
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
}

function addMsg(role, html) {
  const row = document.createElement('div');
  row.className = 'row ' + role;
  const av = document.createElement('div');
  av.className = 'av' + (role === 'user' ? ' uav' : '');
  av.innerHTML = role === 'user'
    ? '<i class="ti ti-user" style="font-size:13px"></i>'
    : '<i class="ti ti-robot" style="font-size:13px"></i>';
  const bub = document.createElement('div');
  bub.className = 'bub';
  bub.innerHTML = html;
  row.appendChild(av); row.appendChild(bub);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return bub;
}

function addOpts(options, cb) {
  const wrap = document.createElement('div');
  wrap.className = 'opts';
  options.forEach(o => {
    const b = document.createElement('button');
    b.className = 'ob'; b.textContent = o;
    b.onclick = () => {
      wrap.querySelectorAll('.ob').forEach(x => { x.disabled = true; });
      b.classList.add('sel');
      setTimeout(() => { wrap.remove(); cb(o); }, 200);
    };
    wrap.appendChild(b);
  });
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'row agent'; row.id = 'typ';
  const av = document.createElement('div'); av.className = 'av';
  av.innerHTML = '<i class="ti ti-robot" style="font-size:13px"></i>';
  const t = document.createElement('div'); t.className = 'typing';
  t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(av); row.appendChild(t);
  chat.appendChild(row); chat.scrollTop = chat.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typ'); if (t) t.remove(); }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function lockInput() { sbtn.disabled = true; inp.disabled = true; }
function unlockInput() { sbtn.disabled = false; inp.disabled = false; inp.focus(); }

// ─── Main text handler ────────────────────────────────────────────────────────

async function handleText(text) {
  if (!text.trim()) return;
  lockInput();
  addMsg('user', text);
  inp.value = ''; inp.style.height = 'auto';

  try {

    // Step 0: goal was selected, ask for target weight
    if (state.step === 0) {
      state.goal = text;
      state.step = 0.1; setProgress(0, 'Goal details');
      addMsg('agent',
        `Got it — <strong>${text}</strong>! Do you have a target weight you want to reach?<br>` +
        `<em style="font-size:12px;color:var(--text2)">Type a number in kg, or press Skip.</em>`
      );
      addOpts(['Skip — no target weight'], () => {
        state.targetWeight = null;
        askTargetDate();
      });
      unlockInput();
    }

    // Step 0.1: user typed a target weight
    else if (state.step === 0.1) {
      const w = parseFloat(text);
      if (isNaN(w) || w < 20 || w > 400) {
        addMsg('agent', 'Please enter a realistic weight in kg (e.g. <em>75</em>), or press Skip.');
        unlockInput(); return;
      }
      state.targetWeight = w;
      askTargetDate();
    }

    // Step 0.2: user typed a target date
    else if (state.step === 0.2) {
      state.targetDate = text.trim() || null;
      await startGoalRefinement();
    }

    // Step 1: weight
    else if (state.step === 1) {
      const w = parseFloat(text);
      if (isNaN(w) || w < 20 || w > 400) {
        addMsg('agent', 'Please enter a realistic weight in kg (e.g. <em>75</em>).');
        unlockInput(); return;
      }
      state.weight = w;
      state.step = 1.5;
      addMsg('agent', 'And your <strong>height in cm</strong>?');
      unlockInput();
    }

    // Step 1.5: height
    else if (state.step === 1.5) {
      const h = parseFloat(text);
      if (isNaN(h) || h < 100 || h > 250) {
        addMsg('agent', 'Please enter a realistic height in cm (e.g. <em>178</em>).');
        unlockInput(); return;
      }
      state.height = h;
      showTyping();
      const check = await callApi('validate_body', { weight: state.weight, height: state.height });
      if (!check.valid) {
        removeTyping();
        addMsg('agent', 'Those values don\'t look realistic. Please re-enter your weight and height.');
        state.step = 1; unlockInput(); return;
      }
      const [calData, schedData] = await Promise.all([
        callApi('calculate_calories', {
          weight: state.weight,
          height: state.height,
          goal: state.refinedGoal,
          target_weight: state.targetWeight,
          target_date: state.targetDate
        }),
        callApi('suggest_schedule', { goal: state.refinedGoal })
      ]);
      removeTyping();
      state.calories = calData.calories;
      state.schedule = schedData.schedule;
      state.step = 2; setProgress(4, 'Schedule');

      let calNote = '';
      if (state.targetWeight && state.targetDate) {
        const diff = (state.targetWeight - state.weight).toFixed(1);
        const dir = diff > 0 ? 'gain' : 'lose';
        calNote = `<br><em style="font-size:11px;color:var(--text2)">Calculated to ${dir} ${Math.abs(diff)}kg in ${state.targetDate}</em>`;
      }

      addMsg('agent',
        `Here is a suggested weekly schedule:<div class="mcard">` +
        state.schedule.map(s => `<div class="mrow"><i class="ti ti-calendar"></i><span>${s}</span></div>`).join('') +
        `</div><div class="mcols">` +
        `<div class="mc"><div class="ml">Daily calories</div><div class="mv" style="color:#534AB7">${state.calories} kcal</div></div>` +
        `<div class="mc"><div class="ml">Goal</div><div class="mv" style="font-size:12px;padding-top:3px">${state.refinedGoal}</div></div>` +
        `</div>${calNote}<br>Does this schedule work for you?`
      );
      addOpts(['Yes, looks good!', 'No, suggest something else'], async v => {
        addMsg('user', v);
        if (v.startsWith('No')) {
          state.step = 2.1;
          addMsg('agent', 'Which days work better? (e.g. <em>Tuesday, Thursday, Saturday</em>)');
          unlockInput();
        } else {
          await doShowLocation();
        }
      });
    }

    // Step 2.1: custom schedule typed
    else if (state.step === 2.1) {
      state.schedule = [text];
      await doShowLocation();
    }

    // Step 4.4: city for gym search
    else if (state.step === 4.4) {
      state.preferences.user_location = text || 'Den Haag';
      state.step = 4.5; setProgress(8, 'Budget');
      addMsg('agent', 'What is your monthly gym budget? (e.g. <em>40 euro</em>)');
      unlockInput();
    }

    // Step 4.5: budget
    else if (state.step === 4.5) {
      if (!text.match(/\d/) && !text.toLowerCase().includes('euro')) {
        addMsg('agent', 'Please include a number, e.g. <em>40 euro per month</em>.');
        unlockInput(); return;
      }
      state.preferences.budget = text;
      state.step = 5; setProgress(9, 'Intensity');
      await doIntensity();
    }

  } catch (e) {
    removeTyping();
    addMsg('agent', `<div class="err"><i class="ti ti-alert-circle"></i> Something went wrong: ${e.message}. Please try again.</div>`);
    unlockInput();
  }
}

// ─── Helper flows ─────────────────────────────────────────────────────────────

function askTargetDate() {
  state.step = 0.2; setProgress(1, 'Goal details');
  addMsg('agent',
    `Do you have a <strong>timeframe</strong> to reach your goal?<br>` +
    `<em style="font-size:12px;color:var(--text2)">Type something like "3 months" or "1 year", or press Skip.</em>`
  );
  addOpts(['Skip — no deadline'], async () => {
    state.targetDate = null;
    await startGoalRefinement();
  });
  unlockInput();
}

async function startGoalRefinement() {
  setProgress(2, 'Refining goal');
  showTyping();
  try {
    const data = await callApi('refine_goal', { goal: state.goal });
    state.refinedGoal = data.refined_goal || state.goal;
  } catch(e) {
    state.refinedGoal = state.goal;
  }
  removeTyping();

  let summary = `I understood your goal as: <strong>${state.refinedGoal}</strong>`;
  if (state.targetWeight) summary += ` · Target: <strong>${state.targetWeight}kg</strong>`;
  if (state.targetDate) summary += ` · Timeframe: <strong>${state.targetDate}</strong>`;
  summary += `<br><br>Now let's look at your body. What is your current <strong>weight in kg</strong>?`;

  state.step = 1; setProgress(3, 'Body info');
  addMsg('agent', summary);
  unlockInput();
}

async function doShowLocation() {
  state.step = 3; setProgress(5, 'Location');
  addMsg('agent', 'Where do you prefer to work out?');
  addOpts(['At a gym', 'At home'], async v => {
    addMsg('user', v);
    state.preferences.location_type = v === 'At a gym' ? 'gym' : 'home';
    state.step = 4; setProgress(6, 'Style');
    await doWorkoutStyle();
  });
}

async function doWorkoutStyle() {
  if (state.preferences.location_type === 'home') {
    state.preferences.workout_style = 'home workout';
    state.preferences.user_location = 'home';
    state.preferences.budget = 'none';
    setProgress(7, 'Timing');
    addMsg('agent', 'When do you prefer to train?');
    addOpts(['Early morning (6–9am)', 'Afternoon (12–3pm)', 'Evening (5–8pm)'], async v => {
      addMsg('user', v);
      const tmap = { 'Early morning (6–9am)': 'early morning', 'Afternoon (12–3pm)': 'afternoon', 'Evening (5–8pm)': 'evening' };
      state.preferences.preferred_time = tmap[v] || v;
      state.step = 5; setProgress(9, 'Intensity');
      await doIntensity();
    });
  } else {
    addMsg('agent', 'What type of gym experience do you prefer?');
    addOpts(['Free weights & machines', 'Group classes', 'Both weights & classes'], async v => {
      addMsg('user', v);
      const smap = {
        'Free weights & machines': 'free weights and machines',
        'Group classes': 'group classes',
        'Both weights & classes': 'both weights and classes'
      };
      state.preferences.workout_style = smap[v] || v;
      setProgress(7, 'Timing');
      addMsg('agent', 'When do you prefer to train?');
      addOpts(['Early morning (6–9am)', 'Afternoon (12–3pm)', 'Evening (5–8pm)'], async v2 => {
        addMsg('user', v2);
        const tmap = { 'Early morning (6–9am)': 'early morning', 'Afternoon (12–3pm)': 'afternoon', 'Evening (5–8pm)': 'evening' };
        state.preferences.preferred_time = tmap[v2] || v2;
        state.step = 4.4; setProgress(8, 'City');
        addMsg('agent', 'In which city should I search for gyms? (e.g. <em>Den Haag</em>, <em>Delft</em>, <em>Rotterdam</em>)');
        unlockInput();
      });
    });
  }
}

async function doIntensity() {
  addMsg('agent', 'What intensity level suits you best?');
  addOpts(['Beginner', 'Intermediate', 'Advanced'], async v => {
    addMsg('user', v);
    state.preferences.intensity = v.toLowerCase();
    state.step = 6; setProgress(10, 'Finding gyms');
    showTyping();
    try {
      const gymData = await callApi('search_gyms', { preferences: state.preferences });
      state.gyms = gymData.gyms;

      if (state.gyms.length === 1 && state.gyms[0] === 'Home Workout') {
        removeTyping();
        state.selectedGym = 'Home Workout';
        state.step = 7; setProgress(11, 'Generating plan');
        await doGeneratePlan();
      } else {
        const selectData = await callApi('select_gym', {
          goal: state.refinedGoal,
          preferences: state.preferences,
          gyms: state.gyms
        });
        removeTyping();
        state.step = 7; setProgress(11, 'Pick a gym');
        addMsg('agent',
          `Found <strong>${state.gyms.length} location${state.gyms.length > 1 ? 's' : ''}</strong> near you. ` +
          (selectData.reason ? `My top pick is <strong>${selectData.selected}</strong> — ${selectData.reason}<br><br>` : '') +
          `Which would you like?`
        );
        addOpts(state.gyms, async v2 => {
          addMsg('user', v2);
          state.selectedGym = v2;
          state.step = 8; setProgress(12, 'Generating plan');
          await doGeneratePlan();
        });
      }
    } catch (e) {
      removeTyping();
      addMsg('agent', `<div class="err">Could not fetch gyms: ${e.message}</div>`);
    }
  });
}

async function doGeneratePlan() {
  const loadBub = addMsg('agent',
    `<div class="loading-line"><div class="spin"></div> Generating your personalised plan — this may take a moment...</div>`
  );
  try {
    const data = await callApi('generate_plan', {
      goal: state.refinedGoal,
      target_weight: state.targetWeight,
      target_date: state.targetDate,
      weight: state.weight,
      height: state.height,
      calories: state.calories,
      schedule: state.schedule,
      selected_gym: state.selectedGym,
      preferences: state.preferences
    });
    loadBub.innerHTML = '';
    state.plan = data.plan;
    setProgress(14, 'Complete');

    let goalLine = state.refinedGoal;
    if (state.targetWeight) goalLine += ` → ${state.targetWeight}kg`;
    if (state.targetDate) goalLine += ` in ${state.targetDate}`;

    addMsg('agent',
      `<strong>Your plan is ready!</strong><br><em style="font-size:12px;color:var(--text2)">${data.summary}</em>` +
      `<div class="mcard">` +
      `<div class="mrow"><i class="ti ti-target"></i><span><strong>Goal:</strong> ${goalLine}</span></div>` +
      `<div class="mrow"><i class="ti ti-flame"></i><span><strong>Calories:</strong> ${state.calories} kcal/day</span></div>` +
      `<div class="mrow"><i class="ti ti-clock"></i><span><strong>Training time:</strong> ${state.preferences.preferred_time}</span></div>` +
      `<div class="mrow"><i class="ti ti-building"></i><span><strong>Facility:</strong> ${state.selectedGym}</span></div>` +
      `<div class="mrow"><i class="ti ti-bolt"></i><span><strong>Intensity:</strong> ${state.preferences.intensity}</span></div>` +
      `</div><div class="plan">${data.plan}</div>`
    );

    inp.placeholder = 'Plan complete!';
    inp.disabled = true; sbtn.disabled = true;
  } catch (e) {
    loadBub.innerHTML = `<div class="err">Plan generation failed: ${e.message}</div>`;
    unlockInput();
  }
}

// ─── Event listeners ──────────────────────────────────────────────────────────

sbtn.addEventListener('click', () => { const v = inp.value.trim(); if (v) handleText(v); });
inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sbtn.click(); } });
inp.addEventListener('input', () => { inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 90) + 'px'; });

// ─── Boot ─────────────────────────────────────────────────────────────────────

(async () => {
  setProgress(0, 'Goal');
  await delay(300);
  addMsg('agent', 'Welcome to your fitness planner! I will help you build a personalised workout and nutrition plan.<br><br>What is your main fitness goal?');
